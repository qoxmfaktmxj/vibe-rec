spring:
  application:
    name: vibe-rec-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5435/vibe_rec}
    username: ${DB_USERNAME:vibe_rec}
    password: ${DB_PASSWORD:vibe_rec}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: vibe-rec-api
    phase: foundation
