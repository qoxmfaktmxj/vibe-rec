spring:
  application:
    name: vibe-rec-api
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5435/vibe_rec}
    username: ${DB_USERNAME:vibe_rec}
    password: ${DB_PASSWORD:vibe_rec}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: vibe-rec-api
    phase: mvp-read-write-auth

app:
  upload:
    base-dir: ${UPLOAD_DIR:./uploads}
  admin:
    dev-account:
      enabled: ${APP_ADMIN_DEV_ACCOUNT_ENABLED:false}
      username: ${APP_ADMIN_DEV_ACCOUNT_USERNAME:admin}
      password: ${APP_ADMIN_DEV_ACCOUNT_PASSWORD:admin}
      display-name: ${APP_ADMIN_DEV_ACCOUNT_DISPLAY_NAME:Dev Admin}
      role: ${APP_ADMIN_DEV_ACCOUNT_ROLE:SUPER_ADMIN}
