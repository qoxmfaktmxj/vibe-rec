services:
  postgres:
    image: postgres:16-alpine
    container_name: vibe-rec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vibe_rec}
      POSTGRES_USER: ${POSTGRES_USER:-vibe_rec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibe_rec}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - ../postgres/data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibe_rec} -d ${POSTGRES_DB:-vibe_rec}"]
      interval: 10s
      timeout: 5s
      retries: 10
