services:
  postgres:
    image: postgres:16-alpine
    container_name: vibe-rec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${DB_HOST_PORT}:5432"
    volumes:
      - vibe-rec-postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vibe-rec-api
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      UPLOAD_DIR: /app/uploads
      APP_ADMIN_DEV_ACCOUNT_ENABLED: ${APP_ADMIN_DEV_ACCOUNT_ENABLED}
      APP_ADMIN_DEV_ACCOUNT_USERNAME: ${APP_ADMIN_DEV_ACCOUNT_USERNAME}
      APP_ADMIN_DEV_ACCOUNT_PASSWORD: ${APP_ADMIN_DEV_ACCOUNT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_HOST_PORT}:8080"
    volumes:
      - vibe-rec-uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}
    container_name: vibe-rec-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:8080/api
      NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${WEB_HOST_PORT}:3000"

volumes:
  vibe-rec-postgres:
  vibe-rec-uploads:
