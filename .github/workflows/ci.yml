name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vibe_rec_test
          POSTGRES_USER: vibe_rec
          POSTGRES_PASSWORD: vibe_rec
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U vibe_rec -d vibe_rec_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Ensure Gradle wrapper is executable
        working-directory: apps/api
        run: chmod +x ./gradlew
      - name: Run tests
        working-directory: apps/api
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:5435/vibe_rec_test
          DB_USERNAME: vibe_rec
          DB_PASSWORD: vibe_rec
        run: ./gradlew test --console=plain

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      - name: Build
        working-directory: apps/web
        run: npm run build
